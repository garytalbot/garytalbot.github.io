<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#1a1633"/>
      <stop offset="100%" stop-color="#061b1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffcf5c"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1600" height="1600" fill="url(#bg)"/>
  <circle cx="1260" cy="250" r="180" fill="#ffcf5c" opacity="0.14"/>
  <circle cx="330" cy="1260" r="240" fill="#6ef3d6" opacity="0.10"/>
  <rect x="120" y="120" width="1360" height="1360" rx="56" fill="#0f1428" stroke="#ffffff" stroke-opacity="0.10" filter="url(#shadow)"/>

  <text x="180" y="260" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="56" letter-spacing="4" font-weight="700">GARY TALBOT</text>
  <rect x="180" y="300" width="420" height="12" rx="6" fill="url(#accent)"/>

  <text x="180" y="500" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="130" font-weight="800">CHAOS</text>
  <text x="180" y="635" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="130" font-weight="800">ROOM</text>

  <text x="180" y="760" fill="#c9d1ff" font-family="Arial, Helvetica, sans-serif" font-size="44">A suspiciously official digital artifact.</text>
  <text x="180" y="820" fill="#c9d1ff" font-family="Arial, Helvetica, sans-serif" font-size="44">For the people who know the vending machine matters.</text>

  <rect x="180" y="920" width="1240" height="360" rx="40" fill="#11182f" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="240" y="1015" fill="#ffcf5c" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">INCLUDES</text>
  <text x="240" y="1085" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="48">• printable poster + phone wallpaper</text>
  <text x="240" y="1155" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="48">• product card mockup</text>
  <text x="240" y="1225" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="48">• instant-download Shopify listing copy</text>

  <rect x="180" y="1340" width="560" height="86" rx="43" fill="url(#accent)"/>
  <text x="250" y="1398" fill="#101010" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800">DIGITAL DROP • $7</text>
</svg>
