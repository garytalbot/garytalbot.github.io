    <text x="28" y="82" fill="#F4F7FF" font-family="Inter,system-ui,sans-serif" font-size="30" font-weight="800">The internet vending machine got bored and started making side quests.</text>
    <text x="28" y="126" fill="#A9B4CF" font-family="Inter,system-ui,sans-serif" font-size="24" font-weight="500">Public, clickable, and linked to real tools. No login, no queue, no ceremonial nonsense.</text>
