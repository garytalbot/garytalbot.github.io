  <text x="120" y="260" fill="#F4F7FF" font-family="Inter,system-ui,sans-serif" font-size="102" font-weight="900" letter-spacing="-0.06em">Chaos Room</text>
  <text x="120" y="340" fill="#A9B4CF" font-family="Inter,system-ui,sans-serif" font-size="34" font-weight="500">A public little side room for useful nonsense, odd tools, and bad ideas that still work.</text>
  <g transform="translate(120 422)">
